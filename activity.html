
<style>
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
*{box-sizing:border-box}
.hdr{background:#1A6B2A;border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;padding:.75rem 1.25rem;display:flex;align-items:center;gap:10px}
.hdr-title{font-size:18px;font-weight:500;color:#EAF3DE}
.question-bar{background:#EAF3DE;border:1px solid #97C459;border-radius:0;padding:.7rem 1.1rem;font-size:14px;font-weight:500;color:#27500A;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:#22863A;color:#EAF3DE;font-size:13px;font-weight:500;padding:.55rem .6rem;text-align:center;border:1px solid #1A6B2A}
td{padding:.45rem .5rem;border:1px solid var(--color-border-tertiary);font-size:13px;text-align:center;vertical-align:middle}
tr:nth-child(even) td{background:var(--color-background-secondary)}
tr.pass-end td{background:#EAF3DE}
tr.final-row td{background:#EAF3DE;font-weight:500}
.arr-inputs{display:flex;gap:3px;align-items:center;justify-content:center;flex-wrap:nowrap}
.arr-inputs span{font-size:12px;color:var(--color-text-tertiary);flex-shrink:0}
.arr-inputs input{width:28px;height:28px;border:1.5px solid var(--color-border-secondary);border-radius:5px;text-align:center;font-size:13px;font-weight:500;padding:0;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;transition:border-color .15s,background .15s}
.arr-inputs input:focus{border-color:#22863A}
.arr-inputs input.ok{border-color:#22c55e;background:#f0fdf4;color:#166534}
.arr-inputs input.err{border-color:#ef4444;background:#fef2f2;color:#991b1b;animation:sh .25s}
@keyframes sh{0%,100%{transform:translateX(0)}30%{transform:translateX(-3px)}70%{transform:translateX(3px)}}
.swap-sel{border:1.5px solid var(--color-border-secondary);border-radius:5px;font-size:13px;padding:2px 4px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;cursor:pointer;transition:border-color .15s}
.swap-sel:focus{border-color:#22863A}
.swap-sel.ok{border-color:#22c55e;background:#f0fdf4;color:#166534}
.swap-sel.err{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:.85rem 0}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.65rem .75rem;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.msg{border-radius:var(--border-radius-md);padding:.65rem 1rem;font-size:13px;line-height:1.6;margin:.75rem 0}
.msg.idle{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.msg.ok{background:#f0fdf4;color:#166534;border:0.5px solid #86efac}
.msg.err{background:#fef2f2;color:#991b1b;border:0.5px solid #fca5a5}
.msg.partial{background:#fefce8;color:#854d0e;border:0.5px solid #fde047}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge.green{background:#dcfce7;color:#166534}
.badge.red{background:#fee2e2;color:#991b1b}
.badge.gray{background:var(--color-background-secondary);color:var(--color-text-secondary)}
</style>

<h2 class="sr-only">버블 정렬 활동 직접 추적 결과 확인 — [7,2,5,1,6] 배열을 버블 정렬한 결과를 단계별로 입력하고 확인하세요</h2>

<div style="border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;margin:1rem 0">

  <div class="hdr">
    <i class="ti ti-list-check" style="font-size:20px;color:#97C459" aria-hidden="true"></i>
    <span class="hdr-title">활동 — 직접 추적해 보기</span>
  </div>

  <div class="question-bar">
    <i class="ti ti-info-circle" style="font-size:16px" aria-hidden="true"></i>
    다음 배열을 버블 정렬로 정렬하세요 &nbsp;:&nbsp; <strong>[ 7, 2, 5, 1, 6 ]</strong>
  </div>

  <div style="padding:1rem 1rem .5rem">

    <div style="overflow-x:auto">
    <table id="main-table">
      <colgroup>
        <col style="width:90px">
        <col style="width:120px">
        <col style="width:72px">
        <col>
      </colgroup>
      <thead>
        <tr><th>회차</th><th>비교 쌍</th><th>교환?</th><th>결과 배열</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    </div>

    <div class="stat-row">
      <div class="stat"><div class="stat-n" id="s-correct">0</div><div class="stat-l">정답 칸</div></div>
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">전체 칸</div></div>
      <div class="stat"><div class="stat-n" id="s-pct">0%</div><div class="stat-l">정확도</div></div>
    </div>

    <div class="msg idle" id="msg"><i class="ti ti-pencil" aria-hidden="true"></i> &nbsp;각 칸을 채우고 <strong>결과 확인</strong> 버튼을 눌러보세요.</div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem">
      <button onclick="checkAll()" style="font-size:13px"><i class="ti ti-check" aria-hidden="true"></i> 결과 확인</button>
      <button onclick="resetAll()" style="font-size:13px"><i class="ti ti-refresh" aria-hidden="true"></i> 다시 풀기</button>
    </div>

    <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:.85rem;font-style:italic;text-align:center">
      <i class="ti ti-bulb" style="font-size:13px" aria-hidden="true"></i>
      &nbsp;힌트: 1패스가 끝나면 가장 큰 수가 맨 뒤로 이동해요!
    </div>

  </div>
</div>

<script>
const INIT=[7,2,5,1,6];

const STEPS=[
  {pass:1,step:1,pair:'arr[0] ↔ arr[1]',swapped:true, arr:[2,7,5,1,6],passEnd:false},
  {pass:1,step:2,pair:'arr[1] ↔ arr[2]',swapped:true, arr:[2,5,7,1,6],passEnd:false},
  {pass:1,step:3,pair:'arr[2] ↔ arr[3]',swapped:true, arr:[2,5,1,7,6],passEnd:false},
  {pass:1,step:4,pair:'arr[3] ↔ arr[4]',swapped:true, arr:[2,5,1,6,7],passEnd:true},
  {pass:2,step:1,pair:'arr[0] ↔ arr[1]',swapped:false,arr:[2,5,1,6,7],passEnd:false},
  {pass:2,step:2,pair:'arr[1] ↔ arr[2]',swapped:true, arr:[2,1,5,6,7],passEnd:false},
  {pass:2,step:3,pair:'arr[2] ↔ arr[3]',swapped:false,arr:[2,1,5,6,7],passEnd:true},
  {pass:3,step:1,pair:'arr[0] ↔ arr[1]',swapped:true, arr:[1,2,5,6,7],passEnd:false},
  {pass:3,step:2,pair:'arr[1] ↔ arr[2]',swapped:false,arr:[1,2,5,6,7],passEnd:true},
  {pass:4,step:1,pair:'arr[0] ↔ arr[1]',swapped:false,arr:[1,2,5,6,7],passEnd:true},
];
const FINAL=[1,2,5,6,7];

function makeArrInputs(rowIdx, sortedFrom){
  const d=document.createElement('div');
  d.className='arr-inputs';
  d.innerHTML='<span>[</span>';
  for(let i=0;i<5;i++){
    if(i>0) d.innerHTML+='<span>,</span>';
    const inp=document.createElement('input');
    inp.type='text'; inp.inputMode='numeric';
    inp.maxLength=1; inp.id=`r${rowIdx}c${i}`;
    inp.setAttribute('aria-label',`${rowIdx+1}번 행 ${i+1}번째 원소`);
    if(sortedFrom!==undefined && i>=sortedFrom){
      inp.style.borderColor='#97C459';
      inp.style.background='#EAF3DE';
      inp.style.color='#27500A';
    }
    d.appendChild(inp);
  }
  d.innerHTML+='<span>]</span>';
  return d;
}

function buildTable(){
  const tb=document.getElementById('tbody');
  tb.innerHTML='';

  STEPS.forEach((s,ri)=>{
    const tr=document.createElement('tr');
    if(s.passEnd) tr.className='pass-end';

    const sortedFrom=s.passEnd ? 5-s.pass : undefined;

    tr.innerHTML=`<td>${s.pass}패스 - ${s.step}</td><td style="font-size:12px">${s.pair}</td>`;

    const swapTd=document.createElement('td');
    const sel=document.createElement('select');
    sel.className='swap-sel'; sel.id=`sw${ri}`;
    sel.innerHTML='<option value="">-</option><option value="O">O</option><option value="X">X</option>';
    swapTd.appendChild(sel);
    tr.appendChild(swapTd);

    const arrTd=document.createElement('td');
    arrTd.appendChild(makeArrInputs(ri, sortedFrom));
    tr.appendChild(arrTd);

    tb.appendChild(tr);
  });

  const finalTr=document.createElement('tr');
  finalTr.className='final-row';
  finalTr.innerHTML='<td colspan="3" style="font-weight:500;color:#27500A">최종 결과</td>';
  const finalTd=document.createElement('td');
  finalTd.appendChild(makeArrInputs('f', 0));
  finalTr.appendChild(finalTd);
  tb.appendChild(finalTr);

  updateStats();
}

function checkAll(){
  let correct=0, total=0;
  const wrong=[];

  STEPS.forEach((s,ri)=>{
    const sel=document.getElementById(`sw${ri}`);
    const swOk = sel.value===(s.swapped?'O':'X');
    sel.className='swap-sel '+(sel.value===''?'':'')+(swOk?'ok':'err');
    total++;
    if(swOk) correct++; else wrong.push(`${s.pass}패스-${s.step} 교환칸`);

    for(let ci=0;ci<5;ci++){
      const inp=document.getElementById(`r${ri}c${ci}`);
      const v=parseInt(inp.value);
      const ans=s.arr[ci];
      const ok=v===ans;
      const isSorted= s.passEnd && ci>=5-s.pass;
      if(!isSorted){
        inp.className=inp.value===''?'':(ok?'ok':'err');
        total++;
        if(ok) correct++; else wrong.push(`${s.pass}패스-${s.step} 결과배열[${ci}]`);
      }
    }
  });

  for(let ci=0;ci<5;ci++){
    const inp=document.getElementById(`rfc${ci}`);
    const v=parseInt(inp.value);
    const ok=v===FINAL[ci];
    inp.className=inp.value===''?'':(ok?'ok':'err');
    total++;
    if(ok) correct++; else wrong.push(`최종결과[${ci}]`);
  }

  const pct=Math.round(correct/total*100);
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-pct').textContent=pct+'%';

  const msg=document.getElementById('msg');
  if(correct===total){
    msg.className='msg ok';
    msg.innerHTML='<i class="ti ti-circle-check" aria-hidden="true"></i> &nbsp;<strong>완벽해요!</strong> 모든 칸이 정답이에요. 버블 정렬 과정을 완벽하게 이해했어요!';
  } else if(pct>=70){
    msg.className='msg partial';
    msg.innerHTML=`<i class="ti ti-alert-circle" aria-hidden="true"></i> &nbsp;<strong>${pct}% 정확해요!</strong> 거의 다 맞았어요. 빨간 칸을 다시 한번 확인해 보세요.`;
  } else {
    msg.className='msg err';
    msg.innerHTML=`<i class="ti ti-x" aria-hidden="true"></i> &nbsp;<strong>${correct}/${total}개 맞았어요.</strong> 틀린 칸을 다시 확인하고, 힌트를 참고해 보세요.`;
  }
}

function resetAll(){
  STEPS.forEach((_,ri)=>{
    const sel=document.getElementById(`sw${ri}`);
    sel.value=''; sel.className='swap-sel';
    for(let ci=0;ci<5;ci++){
      const inp=document.getElementById(`r${ri}c${ci}`);
      if(inp){inp.value='';inp.className='';}
    }
  });
  for(let ci=0;ci<5;ci++){
    const inp=document.getElementById(`rfc${ci}`);
    if(inp){inp.value='';inp.className='';}
  }
  document.getElementById('s-correct').textContent=0;
  document.getElementById('s-total').textContent=0;
  document.getElementById('s-pct').textContent='0%';
  const msg=document.getElementById('msg');
  msg.className='msg idle';
  msg.innerHTML='<i class="ti ti-pencil" aria-hidden="true"></i> &nbsp;각 칸을 채우고 <strong>결과 확인</strong> 버튼을 눌러보세요.';
}

function updateStats(){
  document.getElementById('s-total').textContent=STEPS.length*6+5;
}

buildTable();
</script>
